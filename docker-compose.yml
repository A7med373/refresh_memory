services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:
        postgresql+psycopg://task_tracker:task_tracker@postgres:5432/task_tracker
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: task_tracker
      POSTGRES_PASSWORD: task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: